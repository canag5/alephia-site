<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Aléphia</title>
<link rel="stylesheet" href="/css/style.css">
<style>
table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 20px; }
th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><a href="/" style="display:flex;align-items:center;gap:12px;"><div class="nav-logo-circle">Alé</div><span class="nav-brand">ALEPHIA</span></a></div>
</nav>
<div class="container" style="max-width: 900px;">
  <div class="card">
    <h1 class="page-title">Espace administrateur</h1>
    <div id="loginPart">
      <div class="field"><label>Token admin</label><input type="password" id="token" placeholder="Colle ton ADMIN_TOKEN ici" /></div>
      <button class="btn-primary" onclick="loadData()" style="width:100%;">Voir les inscriptions</button>
    </div>
    <div id="alertBox"></div>
    <div id="tableWrap"></div>
  </div>
</div>

<script>
async function loadData() {
  const token = document.getElementById("token").value;
  localStorage.setItem("admin_token", token);
  try {
    const res = await fetch("/api/admin/registrations", { headers: { "x-admin-token": token } });
    if (!res.ok) throw new Error("Token invalide.");
    const data = await res.json();
    renderTable(data);
  } catch (err) {
    document.getElementById("alertBox").innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  }
}

function renderTable(rows) {
  if (rows.length === 0) {
    document.getElementById("tableWrap").innerHTML = `<p style="color:var(--muted); margin-top:20px;">Aucune inscription pour le moment.</p>`;
    return;
  }
  document.getElementById("tableWrap").innerHTML = `
    <table>
      <thead><tr><th>Date</th><th>Nom</th><th>Email</th><th>Téléphone</th><th>Niveau</th><th>Période</th><th>Semaine</th></tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${new Date(r.createdAt).toLocaleDateString('fr-FR')}</td>
            <td>${r.name}</td>
            <td>${r.email}</td>
            <td>${r.phone || "—"}</td>
            <td>${r.level}</td>
            <td>${r.periodName || "—"}</td>
            <td>${r.weekLabel || "—"} (${r.weekDates || ""})</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

const saved = localStorage.getItem("admin_token");
if (saved) { document.getElementById("token").value = saved; loadData(); }
</script>
</body>
</html>
